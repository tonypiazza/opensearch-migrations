{{- if and (eq .Values.cloudProvider "azure") .Values.azureBlobContainerConfiguration.create }}
apiVersion: batch/v1
kind: Job
metadata:
  name: create-azure-container-{{ .Release.Name }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: azure-container-create
      annotations:
        karpenter.sh/do-not-disrupt: "true"
    spec:
      restartPolicy: OnFailure
      containers:
        - name: azure-cli
          image: {{ .Values.azureBlobContainerConfiguration.bucketOperationImage }}
          imagePullPolicy: {{ .Values.azureBlobContainerConfiguration.bucketOperationImagePullPolicy }}
          env:
            - name: AZURE_STORAGE_ACCOUNT
              valueFrom:
                configMapKeyRef:
                  name: migrations-default-azure-config
                  key: AZURE_STORAGE_ACCOUNT
            - name: AZURE_CONTAINER_NAME
              valueFrom:
                configMapKeyRef:
                  name: migrations-default-azure-config
                  key: AZURE_CONTAINER_NAME
          command:
            - /bin/sh
            - -c
            - |
              set -e
              {{ include "migration.azureFunctions" . | nindent 12 }}

              echo "Target container for creation: $AZURE_CONTAINER_NAME"

              az storage container create --name "$AZURE_CONTAINER_NAME" --account-name "$AZURE_STORAGE_ACCOUNT" --auth-mode login
              echo "Container $AZURE_CONTAINER_NAME created successfully."
{{- end }}
